<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lentopeli</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <div class="map-section">
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-column">

                <p>Content for the first stacked column goes here.</p>
                <div class="btn-grid">
                    <button class="btn">Perkele</button>
                    <button class="btn">Vittu</button>
                    <button class="btn">Saatana</button>
                    <button class="btn">Helvetti</button>
                </div>
            </div>
            <div class="sidebar-column">
                <h2>Collection</h2>
                <p>Content for the second stacked column goes here.</p>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/map.js"></script>
    <script src="js/main.js"></script>

</html>
