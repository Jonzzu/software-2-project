<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lentopeli</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <!-- Left Half: Map -->
        <div class="map-section">
            <div id="map">Your Map Here</div>
        </div>

        <!-- Right Half: Sidebar with 2 Stacked Columns -->
        <div class="sidebar">
            <div class="sidebar-column">
                <h2>Stats & Actions</h2>
                <p>Content for the first stacked column goes here.</p>
                <div class="btn-grid">
                    <button class="btn">Perkele</button>
                    <button class="btn">Vittu</button>
                    <button class="btn">Saatana</button>
                    <button class="btn">Helvetti</button>
                </div>
            </div>
            <div class="sidebar-column">
                <h2>Collection</h2>
                <p>Content for the second stacked column goes here.</p>
            </div>
        </div>
    </div>
</body>
</html>
